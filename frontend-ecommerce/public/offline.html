<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fbfaf7" />
    <title>Sin conexión</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fbfaf7;
        color: #171511;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        border: 1px solid rgba(23, 21, 17, 0.1);
        border-radius: 8px;
        background: white;
        padding: 28px;
        box-shadow: 0 18px 60px rgba(23, 21, 17, 0.08);
      }
      p {
        color: rgba(23, 21, 17, 0.62);
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        border-radius: 6px;
        background: #273f32;
        color: white;
        padding: 0 16px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>No se pudo cargar esta vista. Revisa tu conexión e intenta de nuevo.</p>
      <a href="/">Volver al catálogo</a>
    </main>
  </body>
</html>
